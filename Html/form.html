<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Employee</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/Css/Style2.css?v=3">
</head>
<body>

<!-- Header -->
<header class="header">
    <div id="logo">
        <img src="/assest/logo.png" alt="logo">
    </div>
    <div id="head">
        <div id="h1"><h3>EMPLOYEE</h3></div>
        <div id="h2"><h3>PAYROLL</h3></div>
    </div>
</header>

<!-- Form Container -->
<div class="formContainer">
    <div>
        <h2>Employee Payroll Form</h2>
    </div>

    <form id="form">

        <!-- Name -->
        <div class="form-group">
            <label>Name</label>
            <div class="input-container">
                <input type="text" id="name" placeholder="Enter your name">
                <span class="error-msg" id="name-error"></span>
            </div>
        </div>

        <!-- Profile Image -->
        <div class="form-group">
            <label>Profile Image</label>
            <div class="input-container">
                <div class="profile-images d-flex flex-wrap gap-3">
                   
                    <label><input type="radio" name="profile" value="/assest/avatar-1.svg">
                        <img src="/assest/avatar-1.svg">
                    </label>

                    <label><input type="radio" name="profile" value="/assest/avatar-2.svg">
                        <img src="/assest/avatar-2.svg">
                    </label>

                    <label><input type="radio" name="profile" value="/assest/avatar-3.svg">
                        <img src="/assest/avatar-3.svg">
                    </label>

                    <label><input type="radio" name="profile" value="/assest/avatar-4.svg">
                        <img src="/assest/avatar-4.svg">
                    </label>
                </div>
                <span class="error-msg" id="profile-error"></span>
            </div>
        </div>

        <!-- Gender -->
        <div class="form-group" id="gender">
            <label>Gender</label>
            <div class="input-container">
                <div class="gender-options d-flex gap-3">
                    <label><input type="radio" name="gender" value="Male"> Male</label>
                    <label><input type="radio" name="gender" value="Female"> Female</label>
                </div>
                <span class="error-msg" id="gender-error"></span>
            </div>
        </div>

        <!-- Department -->
        <div class="form-group" id="department">
            <label>Department</label>
            <div class="input-container">
                <div class="dept-options d-flex flex-wrap gap-3">
                    <label><input type="checkbox" value="HR"> HR</label>
                    <label><input type="checkbox" value="Sales"> Sales</label>
                    <label><input type="checkbox" value="Finance"> Finance</label>
                    <label><input type="checkbox" value="Engineer"> Engineer</label>
                    <label><input type="checkbox" value="Others"> Others</label>
                </div>
                <span class="error-msg" id="department-error"></span>
            </div>
        </div>

        <!-- Salary -->
        <div class="form-group">
            <label>Salary</label>
            <div class="input-container">
                <select id="salary">
                    <option>Select Salary</option>
                    <option value="40000">40000</option>
                    <option value="50000">50000</option>
                    <option value="60000">60000</option>
                    <option value="70000">70000</option>
                    <option value="80000">80000</option>
                    <option value="90000">90000</option>
                    <option value="100000">100000</option>
                </select>
                <span class="error-msg" id="salary-error"></span>
            </div>
        </div>

        <!-- Start Date -->
        <div class="form-group">
            <label>Start Date</label>
            <div class="input-container">
                <div class="date-selects">
                    <select id="day">
                        <option>Day</option>
                        <option>1</option>
                        <option>2</option>
                        <option>3</option>
                        <option>4</option>
                        <option>5</option>
                        <option>6</option>
                        <option>7</option>
                        <option>8</option>
                        <option>9</option>
                        <option>10</option>
                        <option>11</option>
                        <option>12</option>
                        <option>13</option>
                        <option>14</option>
                        <option>15</option>
                        <option>16</option>
                        <option>17</option>
                        <option>18</option>
                        <option>19</option>
                        <option>20</option>
                        <option>21</option>
                        <option>22</option>
                        <option>23</option>
                        <option>24</option>
                        <option>25</option>
                        <option>26</option>
                        <option>27</option>
                        <option>28</option>
                        <option>29</option>
                        <option>30</option>
                        <option>31</option>
                    </select>
                    <select id="month">
                        <option>Month</option>
                        <option>Jan</option>
                        <option>Feb</option>
                        <option>Mar</option>
                        <option>Apr</option>
                        <option>May</option>
                        <option>Jun</option>
                        <option>Jul</option>
                        <option>Aug</option>
                        <option>Sep</option>
                        <option>Oct</option>
                        <option>Nov</option>
                        <option>Dec</option>
                    </select>
                    <select id="year">
                        <option>Year</option>
                        <option>2001</option>
                        <option>2002</option>
                        <option>2003</option>
                        <option>2004</option>
                        <option>2005</option>
                        <option>2006</option>
                        <option>2007</option>
                        <option>2008</option>
                        <option>2009</option>
                        <option>2010</option>
                        <option>2011</option>
                        <option>2012</option>
                        <option>2013</option>
                        <option>2014</option>
                        <option>2015</option>
                        <option>2016</option>
                        <option>2017</option>
                        <option>2018</option>
                        <option>2019</option>
                        <option>2020</option>
                        <option>2021</option>
                        <option>2022</option>
                        <option>2023</option>
                        <option>2024</option>
                        <option>2025</option>
                    </select>
                </div>
                <span class="error-msg" id="date-error"></span>
            </div>
        </div>

        <!-- Notes -->
        <div class="form-group">
            <label>Notes</label>
            <div class="input-container">
                <textarea id="notes" rows="4"></textarea>
            </div>
        </div>

        <!-- Buttons -->
        <div class="form-actions d-flex flex-column flex-sm-row gap-2 justify-content-between align-items-stretch">
            <div id="cancel" class="order-last order-sm-first">
                <button type="button" id="cancelBtn" class="w-100">Cancel</button>
            </div>
            <div class="d-flex flex-column flex-sm-row gap-2">
                <button type="submit" class="w-100">Submit</button>
                <button type="reset" class="w-100">Reset</button>
            </div>
        </div>

    </form>
</div>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<!-- <script src="/JavaScript/script.js"></script> -->
<script src="/jQwery/Form.js"></script>
<!-- Bootstrap 5 JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
