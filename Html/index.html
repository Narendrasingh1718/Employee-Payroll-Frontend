<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Payroll</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/Css/Style.css?v=2">
</head>
<body>
<!-- headerSection  -->
<header class="header">
    <div id="logo">
        <img src="/assest/logo.png" alt="logo">
    </div>
    <div id="head">
        <div id="h1"><h3>EMPLOYEE</h3></div>
        <div id="h2"><h3>PAYROLL</h3></div>
    </div>
</header>

<!-- Section -->                                  
 <section id="container" class="container-fluid">
    <div id="mainHeader" class="row align-items-center justify-content-between g-3">
        <div id="banner" class="col-12 col-sm-auto">
            <h3>
                Employee Details
            </h3>
        </div>
        <div id="As" class="col-12 col-sm-auto d-flex align-items-center justify-content-start justify-content-sm-end gap-3 flex-wrap">
            <div id="search">
                 <div class="searchbox" id="searchBox">
                    <img src="/assest/Search.png" alt="logo">
                    <input type="text" id="searchInput" placeholder="Search employee...">
                </div>
            </div>
            <div id="Add button">
                <button>
                    <img  src="/assest/Plus.png" alt="logo">
                    <a href="/Html/form.html">Add Users</a>
                </button>
            </div>
        </div>
    </div>
    <div id="table" class="table-responsive">
        <table>
            <thead>
                <tr>
                  <th>NAME</th>
                  <th>GENDER</th>
                  <th>DEPARTMENT</th>
                  <th>SALARY</th>
                  <th>START DATE</th>
                  <th>ACTIONS</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
 </section>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<!-- <script src="/JavaScript/Script2.js"></script> -->
<script src="/jQwery/Dashboard.js"></script>
<!-- Bootstrap 5 JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
